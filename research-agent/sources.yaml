# Semantic Scholar paper search queries (research papers, no API key required)
# Run periodically; results are relevance-ranked by the API
semantic_scholar_queries:
  - query: "workplace learning adult learning corporate training"
    category: human_development
    limit: 5
  - query: "learning ecosystem skills development enterprise"
    category: human_development
    limit: 5
  - query: "human development lifelong learning professional development"
    category: human_development
    limit: 5
  - query: "AI in education personalized learning"
    category: ai_tech
    limit: 5
  - query: "learning management system LMS effectiveness"
    category: human_development
    limit: 5
