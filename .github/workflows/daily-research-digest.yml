# Copy this file to your REPO ROOT: .github/workflows/daily-research-digest.yml
# (e.g. in my-learning repo, same folder as daily-microlearning.yml)
# GitHub only runs workflows in .github/workflows at the repo root; workflows inside
# research-agent/ are ignored when research-agent is a subfolder.
name: Daily Research Digest

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: Include items from last N days
        required: false
        default: 7
        type: number

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: research-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r research-agent/requirements.txt

      - name: Run research digest
        id: run
        working-directory: research-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p outputs
          python vault_article.py --out-dir outputs --days ${{ github.event.inputs.days || 7 }}

      - name: Commit and push digest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📚 Research digest (daily)"
          file_pattern: "research-agent/outputs/*.md"
